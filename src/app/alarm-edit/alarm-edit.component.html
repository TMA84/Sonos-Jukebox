<ion-header>
  <ion-toolbar>
    <ion-title>{{ alarm.id ? 'Edit' : 'Create' }} Alarm</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="closeModal()">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="alarm-form">
    <!-- Time + Name -->
    <div class="form-row">
      <div class="time-picker">
        <div class="time-selects">
          <select [(ngModel)]="selectedHour" (change)="onTimeChange()" class="time-select">
            <option *ngFor="let h of hours" [value]="h">{{ h }}</option>
          </select>
          <span class="time-colon">:</span>
          <select [(ngModel)]="selectedMinute" (change)="onTimeChange()" class="time-select">
            <option *ngFor="let m of minutes" [value]="m">{{ m }}</option>
          </select>
        </div>
      </div>
      <div class="name-input">
        <input
          type="text"
          [(ngModel)]="alarm.name"
          placeholder="Alarm name"
          class="text-input"
          [attr.inputmode]="kioskService.isKioskMode ? 'none' : null" [readonly]="kioskService.isKioskMode"
        />
      </div>
    </div>

    <!-- Days: presets + individual in one row -->
    <div class="days-row">
      <button
        class="preset-btn"
        [class.active]="isDayPreset('weekdays')"
        (click)="setDayPreset('weekdays')"
      >
        WD
      </button>
      <button
        class="preset-btn"
        [class.active]="isDayPreset('weekend')"
        (click)="setDayPreset('weekend')"
      >
        WE
      </button>
      <button
        class="preset-btn"
        [class.active]="isDayPreset('daily')"
        (click)="setDayPreset('daily')"
      >
        All
      </button>
      <span class="days-divider"></span>
      <button
        *ngFor="let day of weekDays"
        class="day-btn"
        [class.selected]="isDaySelected(day.value)"
        (click)="toggleDay(day.value)"
      >
        {{ day.label }}
      </button>
    </div>

    <!-- Content -->
    <div class="content-picker">
      <label>Content</label>
      <div class="content-list">
        <div
          class="content-item"
          *ngFor="let item of libraryItems"
          [class.selected]="alarm.mediaId === (item.id || item.title)"
          (click)="selectMedia(item)"
        >
          <ion-icon [name]="getContentIcon(item)" class="content-icon"></ion-icon>
          <div class="content-text">
            <span class="content-title">{{ item.title }}</span>
            <span class="content-artist">{{ item.artist }}</span>
          </div>
          <ion-icon
            name="checkmark-circle"
            class="check-icon"
            *ngIf="alarm.mediaId === (item.id || item.title)"
          ></ion-icon>
        </div>
        <div class="content-empty" *ngIf="libraryItems.length === 0">No content available</div>
      </div>
    </div>

    <!-- Volume + Fade in one row -->
    <div class="form-row controls-row">
      <div class="volume-control">
        <label>Vol: {{ alarm.volume || 30 }}%</label>
        <ion-range
          [(ngModel)]="alarm.volume"
          [min]="0"
          [max]="100"
          [step]="5"
          [pin]="true"
        ></ion-range>
      </div>
      <div class="fade-control">
        <ion-toggle [(ngModel)]="alarm.fadeIn"></ion-toggle>
        <label>Fade</label>
      </div>
      <div class="fade-duration" *ngIf="alarm.fadeIn">
        <label>{{ alarm.fadeDuration || 30 }}s</label>
        <ion-range
          [(ngModel)]="alarm.fadeDuration"
          [min]="10"
          [max]="300"
          [step]="10"
          [pin]="true"
        ></ion-range>
      </div>
    </div>

    <!-- Save -->
    <button class="save-btn" (click)="saveAlarm()" [disabled]="!alarm.time || !alarm.mediaId">
      <ion-icon name="checkmark-outline"></ion-icon>
      {{ alarm.id ? 'Save' : 'Create Alarm' }}
    </button>
  </div>
</ion-content>
