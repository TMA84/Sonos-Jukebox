<ion-header>
  <ion-toolbar>
    <ion-title>My Alarms</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="closeModal()">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card class="modern-card">
    <ion-card-header>
      <ion-card-title class="modern-card-title">Alarm Clock</ion-card-title>
      <ion-card-subtitle>Set alarms to automatically play your favorite content</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-button class="modern-button primary" expand="block" (click)="createNewAlarm()">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Create New Alarm
      </ion-button>

      <ion-list *ngIf="alarms.length > 0">
        <ion-item *ngFor="let alarm of alarms">
          <ion-label>
            <h2>{{ alarm.name }}</h2>
            <p>{{ alarm.time }} - {{ getAlarmDaysText(alarm) }}</p>
            <p *ngIf="alarm.mediaTitle">
              <small>Plays: {{ alarm.mediaTitle }}</small>
            </p>
          </ion-label>
          <ion-toggle
            [(ngModel)]="alarm.enabled"
            (ionChange)="toggleAlarmEnabled(alarm)"
            slot="end"
          ></ion-toggle>
          <ion-button fill="clear" color="secondary" (click)="testAlarm(alarm)" slot="end">
            <ion-icon name="play-outline"></ion-icon>
          </ion-button>
          <ion-button fill="clear" color="primary" (click)="editAlarm(alarm)" slot="end">
            <ion-icon name="create-outline"></ion-icon>
          </ion-button>
          <ion-button fill="clear" color="danger" (click)="deleteAlarm(alarm)" slot="end">
            <ion-icon name="trash-outline"></ion-icon>
          </ion-button>
        </ion-item>
      </ion-list>

      <ion-item *ngIf="alarms.length === 0">
        <ion-label color="medium">
          <p>No alarms configured yet</p>
          <p><small>Tap "Create New Alarm" to get started</small></p>
        </ion-label>
      </ion-item>
    </ion-card-content>
  </ion-card>
</ion-content>
