<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>{{artist.name}}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="toggleSearch()">
        <ion-icon name="{{showSearch ? 'close' : 'search-outline'}}"></ion-icon>
      </ion-button>
      <ion-button (click)="toggleKeyboard()">
        <ion-icon name="{{showKeyboard ? 'keypad' : 'keypad-outline'}}"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar *ngIf="showSearch">
    <ion-searchbar
      [(ngModel)]="searchTerm"
      (ionInput)="onSearch()"
      (ionFocus)="setActiveInput('search')"
      placeholder="Search albums..."
      debounce="300"
    >
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content [scrollEvents]="true">
  <!-- Error Message -->
  <ion-card *ngIf="showError" color="danger">
    <ion-card-header>
      <ion-card-title>
        <ion-icon name="warning-outline"></ion-icon>
        Unable to Load Albums
      </ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <p>{{errorMessage}}</p>
      <ion-button fill="outline" color="light" (click)="retryLoadAlbums()">
        <ion-icon name="refresh-outline" slot="start"></ion-icon>
        Try Again
      </ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Loading Indicator -->
  <ion-card *ngIf="isLoading && media.length === 0">
    <ion-card-content class="ion-text-center">
      <ion-spinner></ion-spinner>
      <p>Loading albums...</p>
    </ion-card-content>
  </ion-card>

  <!-- Albums Grid -->
  <ion-grid *ngIf="!showError && media.length > 0">
    <ion-row>
      <ion-col size="4" *ngFor="let album of media">
        <ion-card class="media-card modern-card">
          <img
            [src]="covers[album.title] || '../assets/images/nocover.png'"
            (click)="coverClicked(album)"
            loading="lazy"
            draggable="false"
          />
          <ion-card-header class="modern-card-header" (click)="mediaNameClicked(album)">
            <ion-card-title class="modern-card-title ion-text-nowrap truncate-text">
              {{ album.title }}
            </ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <!-- Scroll trigger for loading more albums -->
  <div #scrollTrigger style="height: 1px"></div>

  <!-- Virtual Keyboard -->
  <div *ngIf="showKeyboard" class="virtual-keyboard">
    <ion-grid>
      <ion-row>
        <ion-col size="1" *ngFor="let digit of ['1','2','3','4','5','6','7','8','9','0']">
          <ion-button size="small" fill="outline" (click)="addKey(digit)">{{digit}}</ion-button>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="1" *ngFor="let key of keyboardRows[0]">
          <ion-button size="small" fill="outline" (click)="addKey(key)">{{key}}</ion-button>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="1" *ngFor="let key of keyboardRows[1]">
          <ion-button size="small" fill="outline" (click)="addKey(key)">{{key}}</ion-button>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="1" *ngFor="let key of keyboardRows[2]">
          <ion-button size="small" fill="outline" (click)="addKey(key)">{{key}}</ion-button>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="1" *ngFor="let digit of ['1','2','3','4','5','6','7','8','9','0']">
          <ion-button size="small" fill="outline" (click)="addKey(digit)">{{digit}}</ion-button>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="2">
          <ion-button size="small" fill="outline" (click)="toggleCase()"
            >{{isUpperCase ? 'abc' : 'ABC'}}</ion-button
          >
        </ion-col>
        <ion-col size="6">
          <ion-button size="small" fill="outline" (click)="addKey(' ')">Space</ion-button>
        </ion-col>
        <ion-col size="2">
          <ion-button size="small" fill="outline" (click)="backspace()">
            <ion-icon name="backspace-outline"></ion-icon>
          </ion-button>
        </ion-col>
        <ion-col size="2">
          <ion-button size="small" fill="solid" (click)="hideKeyboard()">Done</ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
